title: Technical Creators Club
description: >-
  A community of builders sharing practical knowledge about development tools,
  techniques, and ideas. No fluff — just craft.

baseurl: ""
url: "https://technical-creators-club.github.io"

author:
  name: Valeras Narbutas
  github: ValerasNarbutas
  bio: "Developer, builder, open source enthusiast. Writes about tools that actually matter."
  avatar: "https://github.com/ValerasNarbutas.png"

community:
  tagline: "Where builders share what they know"
  description: "A community for developers and creators who craft things with care. No fluff — just the useful part."
  cta_text: "Write for Technical Creators Club"
  cta_url: "https://github.com/Technical-Creators-Club/Technical-Creators-Club.github.io/blob/main/CONTRIBUTING.md"

show_excerpts: true

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

sass:
  sass_dir: _sass
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-seo-tag

nav_links:
  - title: Home
    url: /
  - title: Categories
    url: /categories/
  - title: Tags
    url: /tags/
  - title: About
    url: /about/
  - title: Contribute
    url: https://github.com/Technical-Creators-Club/Technical-Creators-Club.github.io/blob/main/CONTRIBUTING.md
    external: true

exclude:
  - CONTRIBUTING.md
  - "*.gemspec"
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
